name: nix-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Flake check
        run: nix flake check

      - name: Build nixos-wsl
        run: nix build .#nixosConfigurations.nixos-wsl.config.system.build.toplevel
        # nixxy skipped: hardware.nix references machine-specific UUIDs that won't
        # evaluate on generic GitHub runners
